<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVNLOVE</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: "Segoe UI", sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .name {
            font-size: 28px;
            margin-top: 10px;
            color: #aaa;
        }

        .date {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>

<body>

    <canvas id="rain"></canvas>

    <div class="container">
        <h1>S E V N L O V E</h1>
        <div class="name">Nguyễn Vũ</div>
        <div class="date" id="date"></div>
    </div>

    <script>
        /* Date */
        const date = new Date();
        document.getElementById("date").innerHTML =
            date.toLocaleDateString("vi-VN", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });


        /* Rain Effect */

        const canvas = document.getElementById("rain");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let rainDrops = [];

        for (let i = 0; i < 200; i++) {
            rainDrops.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                length: 10 + Math.random() * 20,
                speed: 2 + Math.random() * 2
            });
        }

        function drawRain() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.lineWidth = 1;
            ctx.beginPath();

            for (let drop of rainDrops) {

                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x, drop.y + drop.length);

                drop.y += drop.speed;

                if (drop.y > canvas.height) {
                    drop.y = -20;
                }
            }

            ctx.stroke();
        }

        function animate() {
            drawRain();
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>

</html>
